spring:
  application:
    name: inventario-app-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/inventario_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890123456789012345678901234}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}
