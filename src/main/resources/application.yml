spring:
  application:
    name: inventario-app-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres}
  datasource:
    url: jdbc:h2:mem:inventario_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

jwt:
  secret: ${SECRET_KEY:mySecretKey123456789012345678901234567890123456789012345678901234}
  expiration-minutes: ${ACCESS_TOKEN_EXPIRE_MINUTES:3600}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}
